version: '3.8'

# ============================================================
# PRODUCTION: AWS-backed infrastructure
# - Database : Amazon RDS PostgreSQL
# - Cache    : Amazon ElastiCache Redis
# - Storage  : Amazon S3
# - LLM      : Amazon Bedrock (Claude 3.5 Sonnet + Titan)
# - Auth     : Supabase Auth (Cognito migration optional)
# ============================================================

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # ── AWS RDS PostgreSQL (replaces Supabase) ──────────────────
      - DATABASE_URL=postgresql://postgres:${RDS_PASSWORD}@${RDS_ENDPOINT}.ap-south-1.rds.amazonaws.com:5432/adhi_compliance

      # ── AWS Core ────────────────────────────────────────────────
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-south-1

      # ── Amazon S3 storage ───────────────────────────────────────
      - STORAGE_BACKEND=s3
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}

      # ── Amazon Bedrock LLM ──────────────────────────────────────
      - LLM_PROVIDER=bedrock
      - AWS_BEDROCK_REGION=ap-south-1
      - AWS_BEDROCK_CHAT_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
      - AWS_BEDROCK_EMBED_MODEL_ID=amazon.titan-embed-text-v2:0

      # ── Amazon ElastiCache Redis ────────────────────────────────
      - REDIS_URL=redis://${ELASTICACHE_ENDPOINT}:6379

      # ── Auth ────────────────────────────────────────────────────
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped

  frontend:
    build: ./webapp
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info -Q cpu_tasks
    environment:
      # ── Same AWS env as backend ─────────────────────────────────
      - DATABASE_URL=postgresql://postgres:${RDS_PASSWORD}@${RDS_ENDPOINT}.ap-south-1.rds.amazonaws.com:5432/adhi_compliance
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-south-1
      - STORAGE_BACKEND=s3
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - LLM_PROVIDER=bedrock
      - AWS_BEDROCK_REGION=ap-south-1
      - REDIS_URL=redis://${ELASTICACHE_ENDPOINT}:6379
    restart: unless-stopped

# NOTE: Redis and Postgres services removed — both are now AWS managed.
# ElastiCache replaces the local 'redis' service.
# RDS replaces local Supabase / postgres.
