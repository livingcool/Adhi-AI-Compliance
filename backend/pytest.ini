[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── asyncio mode ──────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Coverage ──────────────────────────────────────────────────────────────────
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=50
    -v
    --tb=short
    --strict-markers

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    security: marks tests related to security (auth, injection, XSS, CORS)
    unit: marks pure unit tests (no DB, no HTTP)
    integration: marks tests that use the full HTTP stack + DB

# ── Warnings ──────────────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:sqlalchemy
    ignore::PendingDeprecationWarning
