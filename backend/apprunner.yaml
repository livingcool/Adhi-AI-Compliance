version: 1.0
runtime: python312
build:
  commands:
    pre-build:
      - pip install --upgrade pip
    build:
      - pip install -r requirements.txt
run:
  command: uvicorn app.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: APP_HOST
      value: "0.0.0.0"
    - name: APP_PORT
      value: "8080"
    - name: LOG_LEVEL
      value: "INFO"
    - name: LLM_PROVIDER
      value: "bedrock"
    - name: STORAGE_BACKEND
      value: "s3"
